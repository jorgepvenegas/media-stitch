<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Walk — Timeline Preview</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="app">
    <div id="preview">
      <video id="preview-video" controls style="display:none;"></video>
      <img id="preview-image" style="display:none;">
      <div id="preview-placeholder">Select an item to preview</div>
    </div>

    <div id="sync-panel">
      <h3>Sync</h3>
      <div class="sync-row">
        <label><input type="radio" name="sync-mode" value="duration" checked> Duration</label>
        <label><input type="radio" name="sync-mode" value="reference"> Reference pair</label>
      </div>
      <div id="sync-duration" class="sync-row">
        <input type="text" id="sync-duration-input" placeholder="-8h23m5s">
      </div>
      <div id="sync-reference" class="sync-row" style="display:none;">
        <input type="text" id="sync-ref-wrong" placeholder="wrong: 2026-04-27T23:28:01+00:00">
        <input type="text" id="sync-ref-correct" placeholder="correct: 2026-04-27T07:05:00">
      </div>
      <div id="sync-error" class="sync-error"></div>
      <div class="sync-row">
        <button id="btn-all-videos" type="button">All videos</button>
        <button id="btn-all-photos" type="button">All photos</button>
        <button id="btn-clear-selection" type="button">Clear</button>
        <span id="sync-selection-count">0 of 0 files selected</span>
      </div>
      <div class="sync-row">
        <button id="btn-add-to-queue" type="button">Add to queue</button>
      </div>
      <div id="sync-queue"></div>
      <div class="sync-row">
        <button id="btn-update-timeline" type="button" disabled>Update timeline</button>
        <button id="btn-clear-queue" type="button" disabled>Clear queue</button>
        <button id="btn-apply" type="button" disabled>Apply</button>
        <button id="btn-render" type="button">Render</button>
      </div>
    </div>

    <div id="bottom">
      <div id="sidebar">
        <h3>Source Files</h3>
        <div id="sidebar-list"></div>
      </div>
      <div id="timeline">
        <h3>Timeline</h3>
        <div id="timeline-scroll">
          <svg id="timeline-svg"></svg>
        </div>
        <div id="timeline-axis"></div>
      </div>
      <div id="details-panel">
        <h3>Details</h3>
        <div id="details-panel-body">
          <div id="details-empty">Select a file to see data</div>
        </div>
      </div>
    </div>
  </div>

  <div id="apply-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <h3>Confirm apply</h3>
      <div id="apply-diff"></div>
      <div class="modal-actions">
        <button id="btn-modal-cancel" type="button">Cancel</button>
        <button id="btn-modal-confirm" type="button">Apply to disk</button>
      </div>
    </div>
  </div>

  <div id="render-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <div id="render-form">
        <h3>Render Video</h3>
        <p class="render-confirm-text">
          This will generate a stitched video from the current timeline.
          The process may take several minutes.
        </p>
        <div class="render-field">
          <label>Output path</label>
          <input type="text" id="render-output" placeholder="/path/to/output.mp4">
        </div>
        <div class="render-field">
          <label>Resolution (optional)</label>
          <input type="text" id="render-format" placeholder="1920x1080">
        </div>
        <div class="render-field row">
          <label>Draft quality</label>
          <input type="checkbox" id="render-draft">
        </div>
        <div class="render-field">
          <label>Image duration (seconds)</label>
          <input type="number" id="render-image-duration" value="3.5" step="0.1" min="0.1">
        </div>
        <div class="render-field">
          <label>Margin (%)</label>
          <input type="number" id="render-margin" value="15" step="1" min="0">
        </div>
        <div class="render-field row">
          <label>Open output folder when done</label>
          <input type="checkbox" id="render-open-folder">
        </div>
        <div class="modal-actions">
          <button id="btn-render-cancel" type="button">Cancel</button>
          <button id="btn-render-start" type="button">Start Render</button>
        </div>
      </div>
      <div id="render-progress" style="display:none;">
        <div class="render-spinner"></div>
        <p class="render-status">Stitching...</p>
        <button id="btn-render-cancel-run" type="button">Cancel</button>
      </div>
    </div>
  </div>
  <div id="toast" class="toast" style="display:none;"></div>

  <script src="/assets/app.js"></script>
</body>
</html>
